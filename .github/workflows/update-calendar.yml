name: Update MICA schedule calendar

on:
  schedule:
    # Runs every 15 minutes. GitHub may delay this slightly under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build ICS
        env:
          SHAREPOINT_URL: ${{ secrets.SHAREPOINT_URL }}
          SHEET_NAME: "Schedule Term-3 phase-1"
        run: python build_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "schedule-bot"
          git config user.email "actions@github.com"
          git add docs/schedule.ics
          git diff --cached --quiet || git commit -m "Update schedule.ics"
          git push
